name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancela ejecuciones previas del mismo ref (ahorra minutos en pushes seguidos).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Bloqueante: lint + typecheck + tests unitarios.
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4  # lee la versión de "packageManager" en package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint (biome)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Tests (shared + api + web)
        run: pnpm test

  # No bloqueante: advisories de dependencias (informativo).
  audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit
        run: pnpm audit --audit-level=high

  # Bloqueante: E2E Playwright (levanta api + web reales).
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright (chromium)
        run: pnpm --filter @bv/web exec playwright install --with-deps chromium

      - name: E2E
        run: pnpm test:e2e
        env:
          CI: "true"

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/web/playwright-report
          retention-days: 7
